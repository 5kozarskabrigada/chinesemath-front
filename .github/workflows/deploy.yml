name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/chinesemath/frontend
            git pull
            docker build -t chinesemath-frontend .
            docker stop chinesemath-frontend || true
            docker rm chinesemath-frontend || true
            docker run -d -p 3000:3000 --name chinesemath-frontend chinesemath-frontend
