# HTTP server - redirects to HTTPS
server {
    listen 80;
    server_name examroomedu.com www.examroomedu.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name examroomedu.com www.examroomedu.com;

    # SSL configuration (you'll set this up with Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/examroomedu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/examroomedu.com/privkey.pem;
    
    # SSL security headers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Chinese Math App - Proxy to Docker Frontend
    location /3/ {
        proxy_pass http://localhost:3000/;  # Docker container on port 3000
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API endpoints - Proxy to Docker Backend
    location /api/ {
        proxy_pass http://localhost:3001/api/;  # Adjust port to your Docker backend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Root path - redirect to Chinese Math app
    location = / {
        return 301 /3/;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
